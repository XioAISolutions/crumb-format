name: Publish ClawHub Skill

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package skill
        run: |
          mkdir -p dist/clawhub
          cp clawhub-skill/SKILL.md dist/clawhub/
          cp clawhub-skill/openclaw.plugin.json dist/clawhub/
          cp clawhub-skill/README.md dist/clawhub/
          cd dist && tar czf crumb-skill-${{ github.ref_name }}.tar.gz clawhub/

      - name: Upload skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: crumb-skill-${{ github.ref_name }}
          path: dist/crumb-skill-${{ github.ref_name }}.tar.gz

      - name: Publish to ClawHub registry
        if: env.CLAWHUB_TOKEN != ''
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $CLAWHUB_TOKEN" \
            -H "Content-Type: application/gzip" \
            --data-binary @dist/crumb-skill-${{ github.ref_name }}.tar.gz \
            "https://registry.clawhub.com/api/v1/skills/crumb/versions" \
            || echo "ClawHub publish skipped (token not set or registry unavailable)"
