# =============================================================================
# CRUMB AUTO-GENERATE TEMPLATE
# =============================================================================
#
# HOW TO USE:
#
# 1. Copy this file into YOUR repository at:
#      .github/workflows/auto-crumb-pr.yml
#
# 2. That's it! Every PR will now auto-generate a .crumb/latest.crumb file
#    containing a structured handoff summary of the PR.
#
# WHAT IT DOES:
#   - Triggers on every pull request (opened or updated)
#   - Extracts PR title, description, and changed files
#   - Generates a .crumb task file with [goal], [context], and [constraints]
#   - Commits the crumb file to the PR branch (only if content changed)
#
# CUSTOMIZATION:
#   - Change `crumb-path` to write the crumb file to a different location
#   - Adjust the [constraints] section below to match your team's review checklist
#   - Add path filters to `on.pull_request.paths` to skip irrelevant PRs
#
# REQUIREMENTS:
#   - The `crumb-format` package (installed automatically via pip)
#   - Repository must allow GitHub Actions to create commits on PR branches
#     (Settings > Actions > General > Workflow permissions > Read and write)
#
# Learn more: https://github.com/your-org/crumb-format
# =============================================================================

name: Auto-Generate Crumb from PR

on:
  pull_request:
    # Only regenerate on open/reopen — running on every push (synchronize)
    # caused churn with multiple auto-commits per PR. Downstream consumers
    # that want per-push regeneration can add `synchronize` back.
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  generate-crumb:
    runs-on: ubuntu-latest
    # Skip bot PRs to avoid infinite commit loops
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crumb-format
        # Prefer the checkout when running in the crumb-format repo itself.
        run: |
          if grep -q '^name = "crumb-format"' pyproject.toml 2>/dev/null; then
            pip install .
          else
            pip install crumb-format
          fi

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | head -100)
          {
            echo "files<<CRUMB_EOF"
            echo "$FILES"
            echo "CRUMB_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract PR description
        id: pr_info
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Extract first paragraph of PR body as the goal
          GOAL=$(echo "$PR_BODY" | awk '/^[[:space:]]*$/{if(found) exit} /[^[:space:]]/{found=1; print}')
          if [ -z "$GOAL" ]; then
            GOAL="$PR_TITLE"
          fi
          {
            echo "goal<<CRUMB_EOF"
            echo "$GOAL"
            echo "CRUMB_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"

      - name: Generate crumb file
        env:
          PR_TITLE: ${{ steps.pr_info.outputs.title }}
          PR_GOAL: ${{ steps.pr_info.outputs.goal }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          CRUMB_PATH=".crumb/latest.crumb"
          mkdir -p "$(dirname "$CRUMB_PATH")"

          cat > "$CRUMB_PATH" << CRUMB_EOF
          --- task: ${PR_TITLE}
          source: github.pr
          pr: #${{ github.event.pull_request.number }}
          generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          ---

          [goal]
          ${PR_GOAL}

          [context]
          Changed files in this PR:
          $(echo "$CHANGED_FILES" | sed 's/^/- /')

          [constraints]
          Review checklist: tests pass, no breaking changes, follows project conventions
          CRUMB_EOF

          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' "$CRUMB_PATH"

      - name: Check for changes
        id: diff
        run: |
          git add -N .crumb/latest.crumb
          if git diff --quiet .crumb/latest.crumb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push crumb file
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .crumb/latest.crumb
          git commit -m "chore: auto-generate .crumb handoff for PR #${{ github.event.pull_request.number }}"
          git push
