name: Build CRUMB Studio

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/build-studio.yml"
      - "cli/**"
      - "studio/**"
      - "tests/test_studio.py"
      - "README.md"
      - "docs/CRUMB_STUDIO.md"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-studio.yml"
      - "cli/**"
      - "studio/**"
      - "tests/test_studio.py"
      - "README.md"
      - "docs/CRUMB_STUDIO.md"
      - "pyproject.toml"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: package-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[studio]" pyinstaller pytest

      - name: Run CLI and Studio verification
        shell: bash
        run: |
          pytest tests/test_crumb.py tests/test_metalk.py tests/test_studio.py
          python -m studio.app --smoke-test
          crumb studio --smoke-test

      - name: Build desktop package
        shell: bash
        run: python studio/packaging/build_studio.py

      - name: Smoke-test built artifact
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            dist/CRUMB-Studio.app/Contents/MacOS/CRUMB-Studio --smoke-test
          elif [[ "${RUNNER_OS}" == "Windows" ]]; then
            dist/CRUMB-Studio/CRUMB-Studio.exe --smoke-test
          else
            dist/CRUMB-Studio/CRUMB-Studio --smoke-test
          fi

      - name: Archive packaged build
        shell: bash
        run: python studio/packaging/archive_build.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: crumb-studio-${{ runner.os }}
          path: dist-artifacts/*
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" dist-artifacts/* --clobber
