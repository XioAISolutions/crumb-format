# =============================================================================
# CRUMB Bench — Copy-Paste Template for Any Repo
# =============================================================================
#
# HOW TO USE:
#   1. Copy this file into your repo at: .github/workflows/crumb-bench.yml
#   2. Commit and push to your default branch (main/master).
#   3. Open a PR that contains .crumb files — the workflow will automatically
#      run `crumb bench` on every .crumb file and post results as a PR comment.
#
# REQUIREMENTS:
#   - Your repo must have .crumb files somewhere in the tree.
#   - The GITHUB_TOKEN (automatic) needs pull-requests: write permission.
#     This is granted by the `permissions` block below.
#
# CUSTOMIZATION:
#   - search-path: change this to limit which directory is searched for .crumb
#     files (e.g. "prompts/" or "context/"). Defaults to the repo root.
#   - python-version: change if you need a specific Python version.
#   - You can also pin to a specific ref of the reusable workflow by changing
#     @main to a tag or commit SHA.
#
# TWO WAYS TO USE THIS:
#
#   Option A — Call the reusable workflow from crumb-format (recommended):
#     This keeps your config minimal and automatically picks up improvements.
#
#   Option B — Self-contained (below, commented out):
#     If you prefer not to depend on the upstream workflow, uncomment the
#     self-contained version at the bottom of this file.
#
# =============================================================================

# ---------------------------------------------------------------------------
# Option A: Call the reusable workflow hosted in crumb-format
# ---------------------------------------------------------------------------
name: CRUMB Bench

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  bench:
    uses: XioAISolutions/crumb-format/.github/workflows/bench-pr.yml@main
    # Uncomment and adjust inputs as needed:
    # with:
    #   search-path: "."         # directory to search for .crumb files
    #   python-version: "3.11"   # Python version

