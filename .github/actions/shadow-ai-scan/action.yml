# Reusable composite action: Shadow AI Scan
#
# Usage from another repository:
#
#   - uses: XioAISolutions/crumb-format/.github/actions/shadow-ai-scan@main
#     with:
#       min-risk: medium
#       fail-on-critical: true

name: Shadow AI Scan
description: >
  Run crumb scan to discover unauthorized/unregistered AI agents and surface
  findings as workflow output. Optionally fail on critical findings.
branding:
  icon: shield
  color: red

inputs:
  path:
    description: "Directory to scan"
    required: false
    default: "."
  min-risk:
    description: "Minimum risk level to report (low, medium, high, critical)"
    required: false
    default: "medium"
  fail-on-critical:
    description: "Fail the step if any CRITICAL findings are detected"
    required: false
    default: "true"

outputs:
  json:
    description: "Scan results in JSON format"
    value: ${{ steps.scan_json.outputs.json }}
  text:
    description: "Scan results in human-readable text format"
    value: ${{ steps.scan_text.outputs.text }}
  total:
    description: "Total number of findings"
    value: ${{ steps.scan_json.outputs.total }}
  critical-count:
    description: "Number of CRITICAL findings"
    value: ${{ steps.scan_json.outputs.critical_count }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install crumb-format
      shell: bash
      run: pip install crumb-format

    - name: Run scan (JSON)
      id: scan_json
      shell: bash
      run: |
        set +e
        OUTPUT=$(crumb scan --path "${{ inputs.path }}" --format json --min-risk "${{ inputs.min-risk }}" 2>&1)
        set -e
        {
          echo "json<<SCAN_EOF"
          echo "$OUTPUT"
          echo "SCAN_EOF"
        } >> "$GITHUB_OUTPUT"

        TOTAL=$(echo "$OUTPUT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('total_findings',0))" 2>/dev/null || echo "0")
        echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

        CRITICAL=$(echo "$OUTPUT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(sum(1 for f in d.get('findings',[]) if f.get('risk_level')=='critical'))" 2>/dev/null || echo "0")
        echo "critical_count=$CRITICAL" >> "$GITHUB_OUTPUT"

    - name: Run scan (text)
      id: scan_text
      shell: bash
      run: |
        set +e
        OUTPUT=$(crumb scan --path "${{ inputs.path }}" --format text --min-risk "${{ inputs.min-risk }}" 2>&1)
        set -e
        {
          echo "text<<SCAN_EOF"
          echo "$OUTPUT"
          echo "SCAN_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Fail on critical findings
      if: inputs.fail-on-critical == 'true'
      shell: bash
      run: |
        CRITICAL="${{ steps.scan_json.outputs.critical_count }}"
        if [ "$CRITICAL" -gt 0 ]; then
          echo "::error::Shadow AI Scan found $CRITICAL CRITICAL finding(s). Failing step."
          exit 1
        fi
        echo "No critical findings detected."
