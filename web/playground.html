<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>crumb playground — prompt compression</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181a20;
    --surface2: #1e2028;
    --border: #2a2d38;
    --text: #e4e4e7;
    --text-dim: #9294a0;
    --accent: #f97316;
    --accent-dim: rgba(249, 115, 22, 0.12);
    --accent-hover: #fb923c;
    --good: #22c55e;
    --warn: #eab308;
    --bad: #ef4444;
    --radius: 10px;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
  }

  header h1 {
    font-size: 1.65rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--text-dim);
    margin-top: 0.4rem;
    font-size: 0.92rem;
  }

  main {
    flex: 1;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 0 1.25rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .controls {
    display: flex;
    gap: 1.25rem;
    align-items: center;
    flex-wrap: wrap;
    padding: 0.85rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .control { display: flex; align-items: center; gap: 0.55rem; }

  .control label {
    font-size: 0.78rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }

  input[type="number"], select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.6rem;
    font-size: 0.88rem;
    outline: none;
    font-family: var(--mono);
  }

  input[type="number"] { width: 5rem; }

  input[type="range"] {
    accent-color: var(--accent);
    width: 7rem;
  }

  .level-pill {
    display: inline-block;
    min-width: 1.5rem;
    text-align: center;
    background: var(--accent-dim);
    color: var(--accent);
    padding: 0.15rem 0.55rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 700;
    font-family: var(--mono);
  }

  .level-help {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    flex: 1;
    min-height: 0;
  }

  @media (max-width: 740px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    min-height: 0;
  }

  .panel-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .panel-stats {
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 500;
  }

  textarea {
    flex: 1;
    min-height: 320px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    font-family: var(--mono);
    font-size: 0.85rem;
    line-height: 1.55;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
    white-space: pre-wrap;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #555869; }
  #output { background: var(--surface2); }

  .actions {
    display: flex;
    gap: 0.55rem;
    flex-wrap: wrap;
    margin-top: 0.4rem;
  }

  button {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    font-weight: 600;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover:not(:disabled) { background: var(--surface2); }

  .summary-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.6rem 1rem;
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .stat { display: flex; gap: 0.4rem; align-items: baseline; }
  .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { color: var(--text); font-weight: 700; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.good { color: var(--good); }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  footer {
    text-align: center;
    padding: 1.25rem 1rem;
    font-size: 0.82rem;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  footer a:hover { text-decoration: underline; }
  footer code {
    background: var(--accent-dim);
    color: var(--accent);
    padding: 0.15em 0.45em;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.85em;
  }

  .level-info {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.55rem 0.9rem;
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .level-info b { color: var(--text); }
</style>
</head>
<body>

<header>
  <h1><span>crumb</span> playground</h1>
  <p>Paste a prompt. Pick a compression level. Copy the slim version.</p>
</header>

<main>
  <div class="controls">
    <div class="control">
      <label for="level">Level</label>
      <input type="range" id="level" min="1" max="5" value="2" step="1">
      <span class="level-pill" id="level-pill">L2</span>
    </div>
    <div class="control">
      <label for="vml">Min word</label>
      <input type="number" id="vml" min="3" max="12" value="4">
    </div>
    <div class="control" id="threshold-control" style="display:none">
      <label for="threshold">Sim ≥</label>
      <input type="number" id="threshold" min="0" max="1" step="0.05" value="0.85">
    </div>
    <div class="control">
      <label for="mode">Mode</label>
      <select id="mode">
        <option value="auto" selected>auto</option>
        <option value="plain">plain text</option>
        <option value="crumb">.crumb</option>
      </select>
    </div>
    <div class="level-help" id="level-help"></div>
  </div>

  <div class="level-info" id="level-info"></div>

  <div class="panels">
    <div class="panel">
      <div class="panel-head">
        <span>Input</span>
        <span class="panel-stats" id="input-stats">0 chars · ~0 tokens</span>
      </div>
      <textarea id="input" placeholder="Paste your prompt, instructions, system message, or .crumb here.

Example:
  Please make sure to fix the authentication middleware in the application
  configuration. The implementation should not change the existing user
  interface, and we need to add a regression test before merging.

Compression runs as you type."></textarea>
    </div>
    <div class="panel">
      <div class="panel-head">
        <span>Compressed</span>
        <span class="panel-stats" id="output-stats">—</span>
      </div>
      <textarea id="output" readonly placeholder="Compressed output appears here…"></textarea>
      <div class="actions">
        <button class="btn-primary" id="btn-copy">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy compressed
        </button>
        <button class="btn-secondary" id="btn-swap">↔ Swap into input</button>
        <button class="btn-secondary" id="btn-clear">Clear</button>
      </div>
    </div>
  </div>

  <div class="summary-bar" id="summary" style="display:none">
    <div class="stat"><span class="stat-label">Tokens</span><span class="stat-value" id="sum-tokens">—</span></div>
    <div class="stat"><span class="stat-label">Saved</span><span class="stat-value good" id="sum-saved">—</span></div>
    <div class="stat"><span class="stat-label">Ratio</span><span class="stat-value accent" id="sum-ratio">—</span></div>
    <div class="stat"><span class="stat-label">Vowels kept</span><span class="stat-value" id="sum-vowels">—</span></div>
    <div class="stat"><span class="stat-label">Mode</span><span class="stat-value" id="sum-mode">—</span></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<footer>
  Powered by <a href="https://github.com/XioAISolutions/crumb-format">CRUMB</a> · MeTalk + vowel-strip ·
  <code>pip install crumb-format</code>
</footer>

<script>
(function () {
  "use strict";

  var LEVEL_DESCRIPTIONS = {
    1: "<b>L1 · dictionary</b> — lossless tech-term abbreviation. Round-trippable.",
    2: "<b>L2 · grammar strip</b> — L1 + drop articles, filler, contractions, verbose phrases.",
    3: "<b>L3 · aggressive</b> — L2 + condense bullets, collapse blank lines.",
    4: "<b>L4 · skeleton</b> — L3 + interior vowel removal (`btfl dy`). Lossy.",
    5: "<b>L5 · adaptive</b> — L4 with per-line embedding-drift guard. Needs the [embeddings] extra on the server."
  };

  var $ = function (id) { return document.getElementById(id); };
  var input = $("input");
  var output = $("output");
  var level = $("level");
  var pill = $("level-pill");
  var help = $("level-help");
  var info = $("level-info");
  var vml = $("vml");
  var threshold = $("threshold");
  var thresholdCtl = $("threshold-control");
  var mode = $("mode");
  var summary = $("summary");

  function showToast(msg) {
    var t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function () { t.classList.remove("show"); }, 1800);
  }

  function estimateTokens(text) {
    return Math.max(1, Math.floor(text.length / 4));
  }

  function updateLevelUI() {
    var lv = parseInt(level.value, 10);
    pill.textContent = "L" + lv;
    info.innerHTML = LEVEL_DESCRIPTIONS[lv];
    thresholdCtl.style.display = (lv === 5) ? "" : "none";
    help.textContent = "";
  }

  function updateInputStats() {
    var t = input.value;
    $("input-stats").textContent =
      t.length + " chars · ~" + estimateTokens(t) + " tokens";
  }

  function setSummary(stats) {
    if (!stats) {
      summary.style.display = "none";
      $("output-stats").textContent = "—";
      return;
    }
    summary.style.display = "";
    $("sum-tokens").textContent =
      stats.original_tokens + " → " + stats.encoded_tokens;
    $("sum-saved").textContent = stats.pct_saved + "%";
    $("sum-ratio").textContent = stats.ratio + "×";
    $("sum-vowels").textContent = (stats.vowel_retention_pct || 100) + "%";
    $("sum-mode").textContent = "L" + stats.level + " / " + stats.mode;
    $("output-stats").textContent =
      stats.encoded_chars + " chars · ~" + stats.encoded_tokens + " tokens · " +
      stats.pct_saved + "% saved";
  }

  var inflight = null;
  var pending = false;

  function compress() {
    var text = input.value;
    if (!text.trim()) {
      output.value = "";
      setSummary(null);
      return;
    }
    if (inflight) {
      pending = true;
      return;
    }
    var payload = {
      text: text,
      level: parseInt(level.value, 10),
      vowel_min_length: parseInt(vml.value, 10) || 4,
      adaptive_threshold: parseFloat(threshold.value) || 0.85,
      mode: mode.value
    };
    inflight = fetch("/metalk/compress", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    }).then(function (r) {
      return r.json().then(function (j) { return { ok: r.ok, body: j }; });
    }).then(function (res) {
      inflight = null;
      if (!res.ok) {
        output.value = "Error: " + (res.body.error || "unknown");
        setSummary(null);
        return;
      }
      output.value = res.body.encoded;
      setSummary(res.body.stats);
    }).catch(function (err) {
      inflight = null;
      output.value = "Error: " + err.message +
        "\n\nIs the server running? Try: crumb playground";
      setSummary(null);
    }).finally(function () {
      if (pending) {
        pending = false;
        compress();
      }
    });
  }

  // Debounced live compression
  var debounceTimer = null;
  function scheduleCompress() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(compress, 250);
  }

  input.addEventListener("input", function () {
    updateInputStats();
    scheduleCompress();
  });
  level.addEventListener("input", function () {
    updateLevelUI();
    scheduleCompress();
  });
  vml.addEventListener("change", scheduleCompress);
  threshold.addEventListener("change", scheduleCompress);
  mode.addEventListener("change", scheduleCompress);

  $("btn-copy").addEventListener("click", function () {
    if (!output.value) { showToast("Nothing to copy"); return; }
    navigator.clipboard.writeText(output.value).then(function () {
      showToast("Copied to clipboard");
    }, function () {
      output.select();
      document.execCommand("copy");
      showToast("Copied to clipboard");
    });
  });

  $("btn-swap").addEventListener("click", function () {
    if (!output.value) return;
    input.value = output.value;
    updateInputStats();
    scheduleCompress();
  });

  $("btn-clear").addEventListener("click", function () {
    input.value = "";
    output.value = "";
    updateInputStats();
    setSummary(null);
  });

  // Initialise
  updateLevelUI();
  updateInputStats();
})();
</script>

</body>
</html>
